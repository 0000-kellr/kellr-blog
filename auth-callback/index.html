<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kellr – E-Mail bestätigt</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1B5E35;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 40px 32px;
      text-align: center;
      max-width: 360px;
      width: 100%;
    }
    .icon { font-size: 56px; margin-bottom: 20px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
    p { font-size: 16px; opacity: 0.85; line-height: 1.5; margin-bottom: 28px; }
    .btn {
      display: inline-block;
      background: white;
      color: #1B5E35;
      font-size: 17px;
      font-weight: 700;
      padding: 16px 32px;
      border-radius: 14px;
      text-decoration: none;
      cursor: pointer;
      border: none;
      width: 100%;
    }
    .status { font-size: 13px; opacity: 0.7; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>E-Mail bestätigt!</h1>
    <p>Deine E-Mail wurde erfolgreich bestätigt. Tippe unten um die App zu öffnen.</p>
    <a class="btn" id="openBtn" href="#">Kellr App öffnen</a>
    <p class="status" id="status">Öffne App automatisch...</p>
  </div>

  <script>
    // Extract tokens from URL fragment
    function parseFragment() {
      var hash = window.location.hash.substring(1);
      var params = {};
      hash.split('&').forEach(function(pair) {
        var kv = pair.split('=');
        if (kv.length === 2) {
          params[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1]);
        }
      });
      return params;
    }

    var params = parseFragment();
    var deepLink = 'kellr://auth-callback' + window.location.hash;
    
    // Update button href
    document.getElementById('openBtn').href = deepLink;

    // Try to open app automatically
    function tryOpenApp() {
      window.location.href = deepLink;
      
      // After 2s, if still here, show manual button prominently
      setTimeout(function() {
        document.getElementById('status').textContent = 'Tippe den Button um die App zu öffnen.';
      }, 2000);
    }

    // Try immediately
    tryOpenApp();
  </script>
</body>
</html>
