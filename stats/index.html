<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kellr — Dashboard</title>
<link rel="icon" href="https://bflxydqsutvpjzrevjlh.supabase.co/storage/v1/object/public/public-assets/kellr-logo.png">
<style>
:root {
  --green: #34C759;
  --green-dim: #2aa24a;
  --bg: #0d0d0d;
  --bg2: #151515;
  --bg3: #1c1c1e;
  --text: #f0f0f0;
  --text2: #a0a0a0;
  --border: #2a2a2a;
  --radius: 12px;
  --max-w: 900px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg); color: var(--text);
  line-height: 1.6; -webkit-font-smoothing: antialiased;
}
a { color: var(--green); text-decoration: none; }

/* NAV */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(13,13,13,0.9); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.nav-inner {
  max-width: var(--max-w); margin: 0 auto; padding: 12px 20px;
  display: flex; align-items: center; justify-content: space-between;
}
.nav-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1.1rem; color: var(--text); }
.nav-logo:hover { text-decoration: none; }
.nav-icon { width: 32px; height: 32px; border-radius: 8px; }
.nav-links { display: flex; align-items: center; gap: 24px; }
.nav-links a { color: var(--text2); font-size: 0.9rem; transition: color .2s; }
.nav-links a:hover, .nav-links a.active { color: var(--text); text-decoration: none; }
.nav-links a.active { color: var(--green); }
.nav-hamburger { display: none; background: none; border: none; color: var(--text); font-size: 1.5rem; cursor: pointer; }
.nav-mobile { display: none; flex-direction: column; gap: 16px; padding: 16px 20px; border-top: 1px solid var(--border); }
.nav-mobile a { color: var(--text2); font-size: 1rem; }
.nav-mobile.open { display: flex; }
@media (max-width: 640px) { .nav-links { display: none; } .nav-hamburger { display: block; } }

/* HERO */
.hero {
  padding: 120px 20px 48px;
  background: radial-gradient(ellipse at 50% 0%, rgba(52,199,89,0.07) 0%, transparent 60%);
  text-align: center;
}
.hero-inner { max-width: var(--max-w); margin: 0 auto; }
.hero-badge {
  display: inline-block; padding: 5px 14px; border-radius: 20px;
  background: rgba(52,199,89,0.1); border: 1px solid rgba(52,199,89,0.25);
  color: var(--green); font-size: 0.8rem; font-weight: 600; margin-bottom: 16px;
}
.hero h1 { font-size: clamp(1.8rem, 5vw, 2.8rem); font-weight: 800; line-height: 1.2; margin-bottom: 10px; }
.hero-sub { color: var(--text2); font-size: 1rem; }
.updated-tag { display: inline-block; margin-top: 10px; font-size: 0.8rem; color: var(--text2); }
.updated-tag span { color: var(--green); }

/* CONTAINER */
.container { max-width: var(--max-w); margin: 0 auto; padding: 0 20px 64px; }

/* SECTION */
.section-label {
  font-size: 0.7rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text2); margin: 36px 0 14px;
}

/* KPI CARDS */
.cards { display: grid; gap: 12px; }
.cards-3 { grid-template-columns: repeat(3, 1fr); }
.cards-2 { grid-template-columns: repeat(2, 1fr); }
.cards-4 { grid-template-columns: repeat(4, 1fr); }

.card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px 22px; transition: border-color .2s;
}
.card:hover { border-color: #3a3a3a; }
.card-label { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text2); margin-bottom: 10px; }
.card-value { font-size: 2.2rem; font-weight: 800; line-height: 1; color: var(--text); }
.card-value.green { color: var(--green); }
.card-sub { font-size: 0.78rem; color: var(--text2); margin-top: 6px; }
.card-delta { font-size: 0.78rem; font-weight: 600; color: var(--green); margin-top: 4px; }
.null-val { color: #3a3a3a; font-size: 1.5rem; }

/* TOP PAGES TABLE */
.table-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  overflow: hidden; margin-top: 12px;
}
.table-card table { width: 100%; border-collapse: collapse; }
.table-card th {
  padding: 10px 16px; text-align: left; font-size: 0.7rem; font-weight: 700;
  letter-spacing: 0.5px; text-transform: uppercase; color: var(--text2);
  background: var(--bg3); border-bottom: 1px solid var(--border);
}
.table-card td { padding: 12px 16px; font-size: 0.85rem; color: var(--text); border-bottom: 1px solid var(--border); }
.table-card tr:last-child td { border-bottom: none; }
.table-card td.num { font-weight: 700; text-align: right; color: var(--green); }
.table-card td.path { color: var(--text2); font-family: monospace; font-size: 0.82rem; }

/* FOOTER */
.footer {
  border-top: 1px solid var(--border); padding: 24px 20px;
  text-align: center; font-size: 0.8rem; color: var(--text2);
}
.footer a { color: var(--green); }

/* LOADING */
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.skeleton {
  background: linear-gradient(90deg, var(--bg3) 25%, #222 50%, var(--bg3) 75%);
  background-size: 200% 100%; animation: shimmer 1.5s infinite;
  border-radius: 6px; height: 40px; margin-bottom: 10px;
}

@media (max-width: 640px) {
  .cards-3, .cards-4 { grid-template-columns: repeat(2, 1fr); }
  .cards-2 { grid-template-columns: 1fr; }
}
@media (max-width: 400px) {
  .cards-3, .cards-4 { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>


<div class="hero">
  <div class="hero-inner">
    <div class="hero-badge">Public Dashboard</div>
    <h1>Kellr in Numbers</h1>
    <p class="hero-sub">Live metrics — updated daily, fully transparent.</p>
    <p class="updated-tag">Last update: <span id="updated-date">—</span></p>
  </div>
</div>

<div class="container" id="dashboard">
  <div class="section-label">Loading...</div>
  <div class="skeleton"></div>
  <div class="skeleton" style="height:120px"></div>
</div>

<footer class="footer">
  <a href="/">kellr.app</a> · Built in public · Data refreshed daily at 06:00 UTC
</footer>

<script>
function v(val, fallback = '—') {
  if (val == null || val === undefined) return `<span class="null-val">${fallback}</span>`;
  return Number(val).toLocaleString('en');
}

async function render() {
  const el = document.getElementById('dashboard');
  try {
    const res = await fetch('../data/metrics.json');
    if (!res.ok) throw new Error('not found');
    const d = await res.json();

    if (d.updated) {
      document.getElementById('updated-date').textContent =
        new Date(d.updated).toLocaleDateString('en', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    const w = d.website  || {};
    const a = d.appstore || {};
    const s = d.app      || {};

    el.innerHTML = `
      <div class="section-label">App Store</div>
      <div class="cards cards-3">
        <div class="card">
          <div class="card-label">Rating</div>
          <div class="card-value green">${a.rating != null ? a.rating.toFixed(1) + ' ★' : '<span class="null-val">—</span>'}</div>
          <div class="card-sub">${v(a.rating_count)} reviews total</div>
        </div>
        <div class="card">
          <div class="card-label">Reviews — 7 Days</div>
          <div class="card-value">${v(a.new_reviews_7d)}</div>
          <div class="card-sub">New reviews</div>
        </div>
        <div class="card">
          <div class="card-label">Downloads — 30 Days</div>
          <div class="card-value">${v(a.downloads_30d)}</div>
          <div class="card-sub">${v(a.downloads_7d)} this week</div>
        </div>
      </div>

      <div class="section-label">Households & Users</div>
      <div class="cards cards-4">
        <div class="card">
          <div class="card-label">Households</div>
          <div class="card-value green">${v(s.households_total)}</div>
          <div class="card-delta">+${v(s.new_households_7d)} this week</div>
        </div>
        <div class="card">
          <div class="card-label">Users</div>
          <div class="card-value">${v(s.users_total)}</div>
          <div class="card-delta">+${v(s.new_users_7d)} this week</div>
        </div>
        <div class="card">
           <div class="card-label">Products</div>
           <div class="card-value">${v(s.products_total)}</div>
           <div class="card-sub">Total tracked</div>
         </div>
         <div class="card">
           <div class="card-label">Transactions</div>
           <div class="card-value">${v(s.transactions_total)}</div>
           <div class="card-sub">Stock changes</div>
         </div>
      </div>

      <div class="section-label">Website — kellr.app</div>
      <div class="cards cards-2">
        <div class="card">
          <div class="card-label">Visitors — 7 Days</div>
          <div class="card-value">${v(w.visitors_7d)}</div>
          <div class="card-sub">Unique visitors</div>
        </div>
        <div class="card">
          <div class="card-label">Visitors — 30 Days</div>
          <div class="card-value">${v(w.visitors_30d)}</div>
          <div class="card-sub">Unique visitors</div>
        </div>
      </div>

      ${w.top_pages && w.top_pages.length ? `
      <div class="table-card">
        <table>
          <thead>
            <tr>
              <th>Top Pages — 30 Days</th>
              <th style="text-align:right;">Visitors</th>
            </tr>
          </thead>
          <tbody>
            ${w.top_pages.map(p => `
            <tr>
              <td class="path">${p.path}</td>
              <td class="num">${Number(p.visitors).toLocaleString('en')}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>` : ''}
    `;
  } catch(e) {
    el.innerHTML = `<div style="color:var(--text2);padding:48px 0;text-align:center;">Could not load metrics.</div>`;
  }
}
render();
</script>
</body>
</html>
